<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouterWatch - تحميل أحدث إصدار</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .logo {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .logo span { color: #3498db; }
        h1 { font-size: 1.5rem; margin-bottom: 20px; }
        .version-badge {
            background: #e8f4fd;
            color: #3498db;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 20px;
        }
        .btn-download {
            background: #3498db;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 10px;
            display: block;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-download:hover { background: #2980b9; }
        .features {
            text-align: right;
            margin-top: 25px;
            font-size: 0.85rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🛡️ Router<span>Watch</span></div>
        <h1>تحميل برنامج حماية الشبكة</h1>
        
        <div id="version-text" class="version-badge">جاري جلب أحدث إصدار...</div>
        
        <a href="#" id="download-btn" class="btn-download">تحميل للويندوز (64-bit)</a>
        
        <div class="features">
            <p>✅ تنظيم وقت الإنترنت للأبناء</p>
            <p>✅ كشف الأجهزة الغريبة والمتصلة</p>
            <p>✅ حماية خصوصية بيانات الراوتر</p>
        </div>
        <p style="font-size: 0.7rem; margin-top: 20px; color: #999;">© 2026 RouterWatch.online</p>
    </div>

    <script>
        // الكود اللي بيخلي التحميل "ديناميكي"
        async function updateDownloadLink() {
            const user = 'moh242eg';
            const repo = 'RouterWatch';
            const apiUrl = `https://api.github.com/repos/${user}/${repo}/releases/latest`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.assets && data.assets.length > 0) {
                    const downloadUrl = data.assets[0].browser_download_url;
                    const versionName = data.tag_name;

                    // تحديث الزرار
                    document.getElementById('download-btn').href = downloadUrl;
                    // تحديث رقم الإصدار المكتوب
                    document.getElementById('version-text').innerText = "الإصدار الأحدث: " + versionName;
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('version-text').innerText = "خطأ في جلب البيانات";
            }
        }

        // تشغيل الدالة بمجرد فتح الصفحة
        updateDownloadLink();
    </script>
</body>
</html>
