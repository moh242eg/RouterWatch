<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouterWatch - تحميل أحدث إصدار</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .logo { font-size: 2.5rem; color: #2c3e50; margin-bottom: 10px; }
        .logo span { color: #3498db; }
        h1 { font-size: 1.5rem; margin-bottom: 20px; }
        .version-badge {
            background: #e8f4fd;
            color: #3498db;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 20px;
        }
        .btn-download {
            background: #3498db;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 10px;
            display: block;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-download:hover { background: #2980b9; }
        .features {
            text-align: right;
            margin-top: 25px;
            font-size: 0.85rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🛡️ Router<span>Watch</span></div>
        <h1>تحميل برنامج حماية الشبكة</h1>
        
        <div id="version-text" class="version-badge">جاري التحقق من أحدث نسخة...</div>
        
        <a href="https://github.com/moh242eg/RouterWatch/releases" id="download-btn" class="btn-download">انقر للتحميل (Windows)</a>
        
        <div class="features">
            <p>✅ تنظيم وقت الإنترنت للأبناء</p>
            <p>✅ كشف الأجهزة الغريبة والمتصلة</p>
            <p>✅ حماية خصوصية بيانات الراوتر</p>
        </div>
        <p style="font-size: 0.7rem; margin-top: 20px; color: #999;">© 2026 RouterWatch.online</p>
    </div>

    <script>
        async function updateDownloadLink() {
            const user = 'moh242eg';
            const repo = 'RouterWatch';
            // الرابط ده بيجيب معلومات آخر إصدار
            const apiUrl = `https://api.github.com/repos/${user}/${repo}/releases/latest`;

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();

                if (data.assets && data.assets.length > 0) {
                    // بياخد أول ملف بصيغة zip أو exe
                    const asset = data.assets.find(a => a.name.endsWith('.zip') || a.name.endsWith('.exe')) || data.assets[0];
                    const downloadUrl = asset.browser_download_url;
                    const versionName = data.tag_name;

                    document.getElementById('download-btn').href = downloadUrl;
                    document.getElementById('version-text').innerText = "الإصدار الحالي: " + versionName;
                } else {
                    // لو مفيش ملفات مرفوعة، يوديه لصفحة الـ Releases
                    document.getElementById('download-btn').href = `https://github.com/${user}/${repo}/releases`;
                    document.getElementById('version-text').innerText = "اطلع على قائمة الإصدارات";
                }
            } catch (error) {
                console.error('Fetch error:', error);
                document.getElementById('version-text').innerText = "استخدم الرابط المباشر للتحميل";
                // رابط طوارئ لصفحة الإصدارات
                document.getElementById('download-btn').href = `https://github.com/${user}/${repo}/releases`;
            }
        }

        updateDownloadLink();
    </script>
</body>
</html>
