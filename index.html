<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouterWatch - تحميل أحدث إصدار</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 420px;
            width: 90%;
        }
        .logo { font-size: 2.8rem; color: #2c3e50; margin-bottom: 10px; }
        .logo span { color: #3498db; }
        h1 { font-size: 1.6rem; margin-bottom: 15px; color: #2c3e50; }
        
        .version-badge {
            background: #e8f4fd;
            color: #3498db;
            padding: 6px 18px;
            border-radius: 25px;
            font-size: 0.95rem;
            display: inline-block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        /* تنسيق عداد التحميلات */
        #download-count {
            font-size: 0.9rem;
            color: #27ae60; /* لون أخضر مريح للعين */
            margin-bottom: 25px;
            font-weight: bold;
            display: block;
        }

        .btn-download {
            background: #3498db;
            color: white;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 12px;
            display: block;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }
        .btn-download:hover { 
            background: #2980b9; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
        }
        
        .features {
            text-align: right;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 0.9rem;
            color: #555;
        }
        .features p { margin: 8px 0; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">🛡️ Router<span>Watch</span></div>
        <h1>تحميل برنامج حماية الشبكة</h1>
        
        <div id="version-text" class="version-badge">جاري التحقق...</div>
        
        <div id="download-count">جاري حساب التحميلات...</div>
        
        <a href="https://github.com/moh242eg/RouterWatch/releases" id="download-btn" class="btn-download">تحميل للويندوز (64-bit)</a>
        
        <div class="features">
            <p>✅ تنظيم وقت الإنترنت للأبناء</p>
            <p>✅ كشف الأجهزة الغريبة والمتصلة</p>
            <p>✅ حماية خصوصية بيانات الراوتر</p>
        </div>
        
        <p style="font-size: 0.75rem; margin-top: 25px; color: #aaa;">© 2026 RouterWatch.online</p>
    </div>

    <script>
        async function getGitHubData() {
            const user = 'moh242eg';
            const repo = 'RouterWatch';
            const apiUrl = `https://api.github.com/repos/${user}/${repo}/releases/latest`;

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Release not found');
                const data = await response.json();

                if (data.assets && data.assets.length > 0) {
                    // 1. تحديث رابط التحميل (أول ملف zip أو exe)
                    const asset = data.assets.find(a => a.name.endsWith('.zip') || a.name.endsWith('.exe')) || data.assets[0];
                    document.getElementById('download-btn').href = asset.browser_download_url;
                    
                    // 2. تحديث رقم الإصدار
                    document.getElementById('version-text').innerText = "الإصدار الأحدث: " + data.tag_name;
                    
                    // 3. حساب إجمالي التحميلات
                    let count = 0;
                    data.assets.forEach(a => count += a.download_count);
                    document.getElementById('download-count').innerHTML = `📥 تم تحميله <span style="color:#2c3e50">${count}</span> مرة حتى الآن`;
                }
            } catch (error) {
                console.error('GitHub API Error:', error);
                document.getElementById('version-text').innerText = "الإصدار الحالي: v0.9.1";
                document.getElementById('download-count').style.display = "none";
            }
        }

        // تشغيل الدالة لمرة واحدة عند تحميل الصفحة
        getGitHubData();
    </script>

</body>
</html>
